services:
  db:
    image: postgres:15
    container_name: devflow-db
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: devflow-redis
    restart: always
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devflow-api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/devflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: devflow-web
    restart: always
    depends_on:
      - api
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_WS_URL: ws://api:4000
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
